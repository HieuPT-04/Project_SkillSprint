spring:
  datasource:
    url: jdbc:h2:mem:skillsprint_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://cognito-idp.ap-southeast-1.amazonaws.com/test_pool

app:
  cors:
    allowed-origins: http://localhost:5173
  cognito:
    region: ap-southeast-1
    user-pool-id: test_pool
    client-id: test-client
    client-secret:
    default-group: LEARNER
    access-key-id:
    secret-access-key:
