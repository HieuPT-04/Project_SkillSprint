spring:
  datasource:
    url: jdbc:h2:mem:skillsprint_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false
  flyway:
    enabled: false
  data:
    redis:
      repositories:
        enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://cognito-idp.ap-southeast-1.amazonaws.com/test_pool

app:
  payment:
    # Keep the test catalogue deliberately small while exercising the same fixed
    # product rule as production: 1 VND = 1 Coin.
    coin:
      enabled: true
      packages:
        - key: COIN_50
          coin-amount: 50
          vnd-amount: 50
        - key: COIN_100
          coin-amount: 100
          vnd-amount: 100
        - key: COIN_500
          coin-amount: 500
          vnd-amount: 500
    # Deterministic SePay settings so the coin top-up webhook can be exercised
    # end-to-end.
    sepay:
      enabled: true
      bank-code: MBBANK
      bank-account-number: "123456789"
      bank-account-name: SKILL SPRINT
      webhook-api-key: test-webhook-secret
      qr-base-url: https://qr.example/{bankCode}/{accountNumber}?amount={amount}&content={content}
      expire-minutes: 15
  session:
    enabled: false
    header-name: X-Session-Id
  rate-limit:
    enabled: false
  cors:
    allowed-origins: http://localhost:5173
  cognito:
    region: ap-southeast-1
    user-pool-id: test_pool
    client-id: test-client
    client-secret:
    default-group: LEARNER
    access-key-id:
    secret-access-key:
  s3:
    region: ap-southeast-1
    bucket: test-bucket
    public-base-url: https://test-bucket.s3.ap-southeast-1.amazonaws.com
    access-key-id:
    secret-access-key:
    upload-url-expiration-minutes: 10
