spring:
  datasource:
    url: jdbc:h2:mem:skillsprint_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false
  flyway:
    enabled: false
  data:
    redis:
      repositories:
        enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://cognito-idp.ap-southeast-1.amazonaws.com/test_pool

app:
  session:
    enabled: false
    header-name: X-Session-Id
  rate-limit:
    enabled: false
  cors:
    allowed-origins: http://localhost:5173
  cognito:
    region: ap-southeast-1
    user-pool-id: test_pool
    client-id: test-client
    client-secret:
    default-group: LEARNER
    access-key-id:
    secret-access-key:
  s3:
    region: ap-southeast-1
    bucket: test-bucket
    public-base-url: https://test-bucket.s3.ap-southeast-1.amazonaws.com
    access-key-id:
    secret-access-key:
    upload-url-expiration-minutes: 10
