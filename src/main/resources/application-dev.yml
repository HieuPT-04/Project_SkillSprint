spring:
  config:
    activate:
      on-profile: dev
  devtools:
    livereload:
      enabled: false          # Vite owns frontend live-reload; disable the devtools LiveReload server
    restart:
      enabled: true
      poll-interval: 2s        # how often the classpath is polled for changes
      quiet-period: 1s         # wait until changes settle before restarting (debounce → no boot-loops)
      # Adds to the built-in excludes (static/**, public/**, templates/**, …) rather than replacing them.
      additional-exclude: "logs/**,*.log,**/*.sql"
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/skillsprint}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${COGNITO_ISSUER_URI:https://cognito-idp.${COGNITO_REGION:ap-southeast-1}.amazonaws.com/${COGNITO_USER_POOL_ID:ap-southeast-1_zyLksLSqU}}

app:
  session:
    enabled: ${APP_SESSION_ENABLED:true}
    header-name: ${APP_SESSION_HEADER_NAME:X-Session-Id}
  rate-limit:
    enabled: ${APP_RATE_LIMIT_ENABLED:true}
    login:
      max-attempts: ${RATE_LIMIT_LOGIN_MAX_ATTEMPTS:5}
      window-seconds: ${RATE_LIMIT_LOGIN_WINDOW_SECONDS:300}
    register:
      max-attempts: ${RATE_LIMIT_REGISTER_MAX_ATTEMPTS:3}
      window-seconds: ${RATE_LIMIT_REGISTER_WINDOW_SECONDS:3600}
    resend-confirmation-code:
      max-attempts: ${RATE_LIMIT_RESEND_CONFIRMATION_MAX_ATTEMPTS:3}
      window-seconds: ${RATE_LIMIT_RESEND_CONFIRMATION_WINDOW_SECONDS:900}
    forgot-password:
      max-attempts: ${RATE_LIMIT_FORGOT_PASSWORD_MAX_ATTEMPTS:3}
      window-seconds: ${RATE_LIMIT_FORGOT_PASSWORD_WINDOW_SECONDS:900}
    payment-create:
      max-attempts: ${RATE_LIMIT_PAYMENT_CREATE_MAX_ATTEMPTS:5}
      window-seconds: ${RATE_LIMIT_PAYMENT_CREATE_WINDOW_SECONDS:900}
    ttl-days: ${APP_SESSION_TTL_DAYS:30}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  cognito:
    region: ${COGNITO_REGION:ap-southeast-1}
    user-pool-id: ${COGNITO_USER_POOL_ID:ap-southeast-1_zyLksLSqU}
    client-id: ${COGNITO_CLIENT_ID}
    client-secret: ${COGNITO_CLIENT_SECRET:}
    default-group: ${COGNITO_DEFAULT_GROUP:LEARNER}
    access-key-id: ${AWS_ACCESS_KEY_ID:}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
  s3:
    region: ${AWS_REGION:ap-southeast-1}
    bucket: ${AWS_S3_BUCKET}
    public-base-url: ${AWS_S3_PUBLIC_BASE_URL}
    access-key-id: ${AWS_ACCESS_KEY_ID:}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
    upload-url-expiration-minutes: ${AWS_S3_UPLOAD_URL_EXPIRATION_MINUTES:10}
  ai:
    gemini:
      enabled: ${GEMINI_ENABLED:true}
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.5-flash}
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
      max-input-chars: ${GEMINI_MAX_INPUT_CHARS:18000}
  payment:
    sepay:
      enabled: ${SEPAY_ENABLED:true}
      bank-code: ${SEPAY_BANK_CODE:}
      bank-account-number: ${SEPAY_BANK_ACCOUNT_NUMBER:}
      bank-account-name: ${SEPAY_BANK_ACCOUNT_NAME:}
      webhook-api-key: ${SEPAY_WEBHOOK_API_KEY:}
      qr-base-url: ${SEPAY_QR_BASE_URL:}
      expire-minutes: ${SEPAY_EXPIRE_MINUTES:15}
      expire-fixed-delay-ms: ${SEPAY_EXPIRE_FIXED_DELAY_MS:60000}
