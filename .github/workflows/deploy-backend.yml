name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run tests
        run: mvn -B test

      - name: Build jar
        run: mvn -B clean package -DskipTests

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/skillsprint_key
          chmod 600 ~/.ssh/skillsprint_key
          test -s ~/.ssh/skillsprint_key
          ssh-keyscan -T 20 -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts || true

      - name: Upload jar to EC2
        run: |
          scp -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -i ~/.ssh/skillsprint_key target/*.jar \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/skillsprint.jar.tmp

      - name: Restart backend
        run: |
          ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 -i ~/.ssh/skillsprint_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            mv /home/${USER}/skillsprint.jar.tmp /home/${USER}/skillsprint.jar
            sudo systemctl restart skillsprint

            echo "Waiting for backend to be ready..."
            for i in {1..30}; do
              if curl -fsS http://127.0.0.1:8080/api/system/status > /tmp/skillsprint-health.json; then
                cat /tmp/skillsprint-health.json
                echo "Backend is ready"
                exit 0
              fi

              echo "Backend not ready yet, retry $i/30..."
              sleep 5
            done

            echo "Backend failed to become ready"
            sudo systemctl status skillsprint --no-pager
            sudo journalctl -u skillsprint -n 120 --no-pager
            exit 1
          EOF

      - name: Public health check
        run: |
          curl -fsS "${{ secrets.HEALTHCHECK_URL }}"
