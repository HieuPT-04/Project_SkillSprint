services:
  postgres:
    image: postgres:16-alpine
    container_name: skillsprint-postgres
    environment:
      POSTGRES_DB: skillsprint
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - skillsprint-postgres-data:/var/lib/postgresql/data

volumes:
  skillsprint-postgres-data:
